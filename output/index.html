<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Station — Sales Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'DM Sans', sans-serif;
    background: #faf7f2;
    color: #2c1810;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-container {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 4px 24px rgba(44, 24, 16, 0.08);
    max-width: 420px;
    width: 90%;
    text-align: center;
}
.login-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
    color: #2c1810;
}
.login-container .subtitle {
    color: #6b3a2a;
    font-size: 14px;
    margin-bottom: 32px;
}
.login-container input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e8e0d8;
    border-radius: 8px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
}
.login-container input:focus {
    border-color: #9b4a2c;
}
.login-container button {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: #9b4a2c;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
}
.login-container button:hover { background: #7a3822; }
.error { color: #c0392b; font-size: 14px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="login-container">
    <h1>The Station</h1>
    <p class="subtitle">Sales Analytics Dashboard</p>
    <form id="loginForm">
        <input type="password" id="pwd" placeholder="Enter password" autofocus>
        <button type="submit">View Dashboard</button>
    </form>
    <p class="error" id="err">Incorrect password. Please try again.</p>
</div>

async function deriveKey(password) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
    );
    const bits = await crypto.subtle.deriveBits(
        { name: "PBKDF2", salt: enc.encode(SALT), iterations: 100000, hash: "SHA-256" },
        keyMaterial, 256
    );
    return new Uint8Array(bits);
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pwd = document.getElementById("pwd").value;
    try {
        const key = await deriveKey(pwd);
        const decoded = atob(PAYLOAD);
        let result = "";
        for (let i = 0; i < decoded.length; i++) {
            result += String.fromCharCode(decoded.charCodeAt(i) ^ key[i % key.length]);
        }
        if (result.includes("<!DOCTYPE") || result.includes("<html") || result.includes("<div")) {
            document.open();
            document.write(result);
            document.close();
        } else {
            document.getElementById("err").style.display = "block";
        }
    } catch(e) {
        document.getElementById("err").style.display = "block";
    }
});
</script>
